LABEL n0ctos
TEXT HELP
Boot the N0ctOS Linux install medium on BIOS.
It allows you to install N0ctOS Linux or perform system maintenance.
ENDTEXT
MENU LABEL N0ctOS Linux install medium (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen
