LABEL n0ctos_nbd
TEXT HELP
Boot the N0ctOS Linux install medium using NBD.
It allows you to install N0ctOS Linux or perform system maintenance.
ENDTEXT
MENU LABEL N0ctOS Linux install medium (%ARCH%, NBD)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-zen.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archiso_nbd_srv=${pxeserver} cms_verify=y
SYSAPPEND 3

LABEL n0ctos_nfs
